# Alembic configuration for the AI BI Copilot.
# Migrations are hand-written (no autogenerate) to stay additive and avoid
# conflicts with Base.metadata.create_all, which remains as an idempotent
# safety net. Run:  alembic upgrade head
[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# DATABASE_URL is read from the environment / .env inside env.py.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S